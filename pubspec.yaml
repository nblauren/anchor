  cryptography: ^2.7.0
  cupertino_icons: ^1.0.6
  drift: ^2.14.1
  equatable: ^2.0.5
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.3
  flutter_local_notifications: ^20.1.0
  flutter_nearby_connections_plus:
    path: /Users/nblaurenciana/Documents/GitHub/flutter_nearby_connections_plus
  flutter_secure_storage: ^9.2.2
  get_it: ^7.6.4
  image_compression_flutter:
