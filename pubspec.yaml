name: anchor
description: A local-first, offline dating/social discovery app using Bluetooth mesh networking.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.3

  # Local Database
  drift: ^2.14.1
  sqlite3_flutter_libs: ^0.5.18

  # Dependency Injection
  get_it: ^7.6.4

  # Utilities
  equatable: ^2.0.5
  uuid: ^4.2.2
  path_provider: ^2.1.1
  shared_preferences: ^2.2.2
  flutter_local_notifications: ^21.0.0
  app_badge_plus: ^1.2.7

  # BLE Communication
  bluetooth_low_energy: ^6.2.1
  permission_handler: ^11.0.0

  # Image Handling
  image_picker: ^1.0.5
  image_compression_flutter: ^1.0.4

  # UI
  cupertino_icons: ^1.0.6
  path: ^1.9.1
  photo_view: ^0.15.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  drift_dev: ^2.14.1
  build_runner: ^2.4.7

flutter:
  uses-material-design: true
