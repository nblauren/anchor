name: anchor
description: A local-first, offline dating/social discovery app using Bluetooth mesh networking.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  app_badge_plus: ^1.2.7
  audioplayers: ^6.1.0
  battery_plus: ^6.0.3
